# Optional infra for the non-degraded path (Postgres+pgvector and Redis).
# The backend runs without this using SQLite and the degrade paths.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital
      POSTGRES_DB: hospital_prep
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
